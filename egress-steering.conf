# /etc/egress-steering/egress-steering.conf
#
# Configuration for the egress traffic steering reconciler.
# Modify this file and restart the egress-steering service to apply changes.

# Pod IPs or CIDRs to steer through egress nodes (IPv4).
# Uses nftables set syntax. Examples:
#   CIDR range:   POD_CIDRS="10.132.0.0/14"
#   Single IP:    POD_CIDRS="10.132.2.29"
#   Multiple:     POD_CIDRS="{ 10.132.2.0/24, 10.132.3.0/24 }"
#   Mixed:        POD_CIDRS="{ 10.132.2.29, 10.132.3.0/24 }"
POD_CIDRS="10.132.0.0/14"

# Cluster-internal CIDRs excluded from steering (IPv4: Pod, Service, Machine, link-local).
# Traffic to these destinations is never steered.
CLUSTER_CIDRS="10.132.0.0/14, 172.30.0.0/16, 10.6.105.0/24, 169.254.169.0/29"

# IPv6 Pod CIDRs to steer (optional, leave empty to disable IPv6 steering).
# Same nftables set syntax as POD_CIDRS.
POD_CIDRS_V6=""

# IPv6 cluster-internal CIDRs excluded from steering (optional).
# Required if POD_CIDRS_V6 is set.
CLUSTER_CIDRS_V6=""

# API server URL (e.g., https://api-int.cluster.example.com:6443).
API_SERVER="https://api-int.example.com:6443"

# Path to the API server CA certificate.
CA_FILE="/etc/egress-steering/ca.crt"

# Path to the ServiceAccount token file.
TOKEN_FILE="/etc/egress-steering/token"

# Packet mark used for policy routing (must not conflict with other fwmarks).
FWMARK="0x2000"

# Routing table number and rule priority for steered traffic.
RT_TABLE="100"
RT_PRIO="1000"

# Seconds between reconciliation cycles.
RECONCILE_INTERVAL=10

# Seconds to wait for ping reply when probing egress node health.
PING_TIMEOUT=2

# ECMP multipath hash policy (0=L3, 1=L4). L4 hashing spreads flows to the
# same destination IP across egress nodes by including src/dst ports.
FIB_MULTIPATH_HASH_POLICY=1

# nftables table names (must not conflict with existing tables).
NFT_TABLE_WORKER="egress-steering"
NFT_TABLE_EGRESS="egress-snat"
