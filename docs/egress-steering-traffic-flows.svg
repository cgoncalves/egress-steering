<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 545" font-family="monospace" font-size="12">
  <style>
    /* Background */
    .bg { fill: #1a1a2e; }

    /* Boxes */
    .box { fill: #16213e; stroke: #0f3460; stroke-width: 2; rx: 8; }
    .box-egress { fill: #1a1a3e; stroke: #e94560; stroke-width: 2; rx: 8; }
    .box-external { fill: #0f3460; stroke: #53a8b6; stroke-width: 2; rx: 8; }
    .box-label { fill: #e0e0e0; font-size: 13px; font-weight: bold; text-anchor: middle; }
    .box-sublabel { fill: #8888aa; font-size: 10px; text-anchor: middle; }

    /* Legend */
    .legend-title { fill: #e0e0e0; font-size: 14px; font-weight: bold; }
    .legend-text { fill: #cccccc; font-size: 11px; }

    /* Title */
    .title { fill: #ffffff; font-size: 18px; font-weight: bold; text-anchor: middle; }
    .subtitle { fill: #8888aa; font-size: 12px; text-anchor: middle; }

    /* Flow labels */
    .flow-label { font-size: 8px; text-anchor: middle; }

    /* Egress flow: single packet travels the full round-trip sequentially.
       0-45%: outbound (Pod -> Worker -> Egress Node -> External) red
       55-100%: return (External -> Egress Node -> Worker -> Pod) teal
       Total cycle: 16s */
    @keyframes egress-roundtrip {
      0%   { offset-distance: 0%; opacity: 0; }
      2%   { opacity: 1; }
      43%  { opacity: 1; }
      45%  { offset-distance: 100%; opacity: 0; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @keyframes egress-return {
      0%   { offset-distance: 0%; opacity: 0; }
      55%  { offset-distance: 0%; opacity: 0; }
      57%  { opacity: 1; }
      98%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    @keyframes flow-direct {
      0%   { offset-distance: 0%; opacity: 0; }
      5%   { opacity: 1; }
      45%  { opacity: 1; }
      50%  { offset-distance: 100%; opacity: 0; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    .packet-egress-out {
      offset-path: path('M 160,240 L 160,350 L 620,350 L 620,240 L 620,350 L 810,350 L 810,240');
      animation: egress-roundtrip 16s ease-in-out infinite;
      fill: #e94560;
    }
    .packet-egress-ret {
      offset-path: path('M 810,240 L 810,350 L 620,350 L 620,240 L 620,350 L 160,350 L 160,240');
      animation: egress-return 16s ease-in-out infinite;
      fill: #53a8b6;
    }
    .packet-pod {
      offset-path: path('M 200,175 C 280,135 360,135 430,165');
      animation: flow-direct 8s ease-in-out infinite;
      fill: #4ecca3;
    }
    .packet-svc {
      offset-path: path('M 200,210 C 280,230 360,235 430,225');
      animation: flow-direct 9s ease-in-out infinite;
      animation-delay: 2s;
      fill: #f0c040;
    }
    .packet-node {
      offset-path: path('M 200,165 C 280,100 360,90 430,105');
      animation: flow-direct 10s ease-in-out infinite;
      animation-delay: 4s;
      fill: #b060d0;
    }

    /* SNAT labels flash as the outbound packet passes each hop */
    @keyframes snat-flash1 {
      0%, 15%, 25%, 100% { opacity: 0; }
      17%, 23% { opacity: 1; }
    }
    @keyframes snat-flash2 {
      0%, 30%, 42%, 100% { opacity: 0; }
      33%, 40% { opacity: 1; }
    }
    .snat-label {
      fill: #e94560;
      font-size: 9px;
      font-weight: bold;
      text-anchor: middle;
      animation: snat-flash1 16s ease-in-out infinite;
    }
    .snat-label2 {
      fill: #e94560;
      font-size: 9px;
      font-weight: bold;
      text-anchor: middle;
      animation: snat-flash2 16s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="900" height="545"/>

  <!-- Title -->
  <text class="title" x="450" y="35">Egress Steering Traffic Flows</text>
  <text class="subtitle" x="450" y="52">Pod-initiated external traffic is steered via egress node; cluster-internal traffic is direct</text>

  <!-- Cluster boundary -->
  <rect x="30" y="70" width="720" height="260" rx="12" fill="none" stroke="#333355" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="45" y="88" fill="#555577" font-size="11">OpenShift Cluster</text>

  <!-- Worker Node -->
  <rect class="box" x="60" y="100" width="220" height="210"/>
  <text class="box-label" x="170" y="125">Worker Node</text>
  <text class="box-sublabel" x="170" y="140">10.6.105.228</text>

  <!-- Source Pod -->
  <rect x="90" y="155" width="140" height="50" rx="6" fill="#1e3a5f" stroke="#4ecca3" stroke-width="1.5"/>
  <text class="box-label" x="160" y="178" font-size="11">Pod A</text>
  <text class="box-sublabel" x="160" y="192">10.135.0.14</text>

  <!-- nftables label - right under the Pod box -->
  <text x="160" y="222" fill="#e94560" font-size="9" text-anchor="middle">nft: mark 0x2000</text>

  <!-- Node B (machine network) - aligned row 1 -->
  <rect x="390" y="85" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#b060d0" stroke-width="1.5"/>
  <text class="box-label" x="450" y="108" font-size="11">Node B</text>
  <text class="box-sublabel" x="450" y="122">10.6.105.207</text>

  <!-- Dest Pod - aligned row 2 -->
  <rect x="390" y="145" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#4ecca3" stroke-width="1.5"/>
  <text class="box-label" x="450" y="168" font-size="11">Pod B</text>
  <text class="box-sublabel" x="450" y="182">10.135.1.5</text>

  <!-- K8s Service - aligned row 3 -->
  <rect x="390" y="205" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#f0c040" stroke-width="1.5"/>
  <text class="box-label" x="450" y="228" font-size="11">Service</text>
  <text class="box-sublabel" x="450" y="242">172.30.10.50</text>

  <!-- Egress Node -->
  <rect class="box-egress" x="560" y="100" width="180" height="210"/>
  <text class="box-label" x="650" y="125">Egress Node</text>
  <text class="box-sublabel" x="650" y="140">10.6.105.51</text>

  <!-- Egress nftables -->
  <text x="650" y="165" fill="#e94560" font-size="9" text-anchor="middle">nft: mark 0x3000</text>
  <text x="650" y="176" fill="#e94560" font-size="9" text-anchor="middle">MASQUERADE</text>

  <!-- External -->
  <rect class="box-external" x="770" y="100" width="110" height="210"/>
  <text class="box-label" x="825" y="125">External</text>
  <text class="box-sublabel" x="825" y="140">1.1.1.1</text>

  <!-- Flow 1: Egress (steered) - Pod to Egress Node, Egress Node to External -->
  <path d="M 160,240 L 160,350 L 620,350 L 620,240" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <path d="M 620,240 L 620,350 L 810,350 L 810,240" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Flow 2: Pod-to-Pod -->
  <path d="M 200,175 C 280,135 360,135 430,165" fill="none" stroke="#4ecca3" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Flow 3: Pod-to-Service -->
  <path d="M 200,210 C 280,230 360,235 430,225" fill="none" stroke="#f0c040" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Flow 4: Pod-to-Node (machine network) -->
  <path d="M 200,165 C 280,100 360,90 430,105" fill="none" stroke="#b060d0" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Src IP labels on flows -->
  <text class="flow-label" x="310" y="100" fill="#b060d0">src: 10.135.0.14</text>
  <text class="flow-label" x="310" y="130" fill="#4ecca3">src: 10.135.0.14</text>
  <text class="flow-label" x="310" y="248" fill="#f0c040">src: 10.135.0.14</text>
  <text class="flow-label" x="390" y="365" fill="#e94560">src: 10.6.105.228</text>
  <text class="flow-label" x="720" y="365" fill="#e94560">src: 10.6.105.51</text>

  <!-- Animated packets -->
  <circle class="packet-egress-out" r="5"/>
  <circle class="packet-egress-ret" r="4"/>
  <circle class="packet-pod" r="5"/>
  <circle class="packet-svc" r="5"/>
  <circle class="packet-node" r="5"/>

  <!-- SNAT labels that flash -->
  <text class="snat-label" x="160" y="375">SNAT: Pod IP -> Worker IP</text>
  <text class="snat-label2" x="720" y="375">SNAT: Worker IP -> Egress Node IP</text>

  <!-- Legend -->
  <rect x="40" y="420" width="820" height="110" rx="8" fill="#16213e" stroke="#333355" stroke-width="1"/>
  <text class="legend-title" x="60" y="442">Traffic Flows</text>

  <!-- Legend items -->
  <circle cx="70" cy="462" r="5" fill="#e94560"/>
  <text class="legend-text" x="85" y="466">External egress (steered via egress node, double SNAT)</text>

  <circle cx="70" cy="482" r="4" fill="#53a8b6"/>
  <text class="legend-text" x="85" y="486">External return (un-SNAT on egress, un-SNAT on worker)</text>

  <circle cx="500" cy="462" r="5" fill="#4ecca3"/>
  <text class="legend-text" x="515" y="466">Pod-to-Pod (direct via OVN, not steered)</text>

  <circle cx="500" cy="482" r="5" fill="#b060d0"/>
  <text class="legend-text" x="515" y="486">Pod-to-Node (machine network, not steered)</text>

  <circle cx="70" cy="502" r="5" fill="#f0c040"/>
  <text class="legend-text" x="85" y="506">Pod-to-Service (direct via OVN, not steered)</text>

  <text class="legend-text" x="60" y="522" fill="#8888aa">Steered traffic exits the cluster with the egress node's IP. Cluster-internal traffic (Pods, Services, Nodes) is never steered.</text>
</svg>
